# This workflow publishes the package to npm when a release is created
name: Client Build & Test

on:  
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    # Do not run on version-bump commits pushed by the release bot.
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Verify
        run: npm run prepublish
        working-directory: packages/base

      # - name: Test
      #   run: npm run test -- --run
      #   working-directory: packages/client
