# CI workflow — runs on every push to main and prerelease branches (v<M>.<m>-<channel>).
#
# Steps:
#   1. Discover all publishable packages (have a "prepublish" script, not in EXCLUDED_PACKAGES).
#   2. Build each package via "prepublish" (lint + type-check + build + unit tests).
#      Unit tests run with OPCUA_EXTERNAL_SERVER=1 (embedded in each package's test script)
#      so no live OPC UA server is needed in CI.
#
# Versions in package.json are always 0.0.0 in git.
# To publish a release, trigger the Release workflow manually.

name: CI

on:
  push:
    branches:
      - main
      - 'v*'
  pull_request:
    branches:
      - main

env:
  EXCLUDED_PACKAGES: generator

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Discover publishable packages
        id: packages
        run: |
          DIRS=()
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            if echo " $EXCLUDED_PACKAGES " | grep -qw "$name"; then
              echo "Skipping excluded package: $name"
              continue
            fi
            if ! node -e "const p=require('./${pkg}package.json'); process.exit(p.scripts&&p.scripts.prepublish?0:1)" 2>/dev/null; then
              echo "Skipping package without prepublish script: $name"
              continue
            fi
            DIRS+=("$name")
            echo "Found publishable package: $name"
          done
          echo "list=${DIRS[*]}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== build: packages/${pkg} ==="
            npm run prepublish --prefix "packages/${pkg}"
          done
