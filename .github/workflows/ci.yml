# CI workflow — runs on every push to main and prerelease branches (v<M>.<m>-<channel>).
#
# Steps:
#   1. Install dependencies.
#   2. Run "verify" (lint + type-check + build + unit tests) across all packages via Nx.
#      Nx respects inter-package build order and caches results automatically.
#      Unit tests run with OPCUA_EXTERNAL_SERVER=1 (embedded in each package's test script)
#      so no live OPC UA server is needed in CI.
#
# Versions in package.json are always 0.0.0 in git.
# To publish a release, trigger the Release workflow manually.

name: CI

on:
  push:
    branches:
      - main
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Verify all packages
        run: npx nx run-many -t verify
