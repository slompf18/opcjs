# Automated release workflow.
#
# Triggers on:
#   - push to main                          -> stable release, no prerelease suffix, npm tag: latest
#   - push to <channel>/v<major>.<minor>    -> prerelease, suffix = channel, npm tag = channel
#       e.g.  alpha/v0.1,  beta/v1.2,  dev/v0.3
#
# Flow:
#   1. Discover all publishable packages (packages/* that have a "prepublish" script,
#      excluding packages listed in EXCLUDED_PACKAGES).
#   2. Run "npm run prepublish" for each discovered package.
#   3. Compute the next semver for each package:
#        main branch:           bump patch, no prerelease suffix.
#        <channel>/v<M>.<m>:    same M.m -> bump patch; different -> reset to 0. Append -<channel>.
#   4. Commit all updated package.json files with [skip ci] and push.
#   5. Create a GitHub release (prerelease=false on main, prerelease=true otherwise).
#
# The publish workflow (publish.yml) fires automatically on release: [created]
# and publishes all discovered packages to npm.

name: Release

on:
  push:
    branches:
      - main
      - '*/v*'

permissions:
  contents: write

env:
  # Space-separated list of package directory names to skip (not published).
  EXCLUDED_PACKAGES: generator

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Discover publishable packages
        id: packages
        run: |
          DIRS=()
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            # Skip excluded packages.
            if echo " $EXCLUDED_PACKAGES " | grep -qw "$name"; then
              echo "Skipping excluded package: $name"
              continue
            fi
            # Skip packages without a "prepublish" script.
            if ! node -e "const p=require('./${pkg}package.json'); process.exit(p.scripts&&p.scripts.prepublish?0:1)" 2>/dev/null; then
              echo "Skipping package without prepublish script: $name"
              continue
            fi
            DIRS+=("$name")
            echo "Found publishable package: $name"
          done
          # Space-separated list used by subsequent steps.
          echo "list=${DIRS[*]}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies for all packages
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== npm ci: packages/${pkg} ==="
            npm ci --prefix "packages/${pkg}"
          done

      - name: Prepublish all packages
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== prepublish: packages/${pkg} ==="
            npm run prepublish --prefix "packages/${pkg}"
          done

      - name: Compute new versions
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          PACKAGES="${{ steps.packages.outputs.list }}"

          read_stripped() {
            local pkgfile="$1" current
            current=$(node -p "require('./${pkgfile}').version")
            echo "${current%%-*}"
          }

          if [[ "$BRANCH" == "main" ]]; then
            for pkg in $PACKAGES; do
              stripped=$(read_stripped "packages/${pkg}/package.json")
              major=$(echo "$stripped" | cut -d. -f1)
              minor=$(echo "$stripped" | cut -d. -f2)
              patch=$(echo "$stripped" | cut -d. -f3)
              patch="${patch:-0}"
              new_ver="${major}.${minor}.$((patch + 1))"
              echo "${pkg}_version=${new_ver}" >> "$GITHUB_OUTPUT"
              # Use base package to derive the release tag.
              if [[ "$pkg" == "base" ]]; then
                echo "release_tag=v${new_ver}" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            NPM_CHANNEL="${BRANCH%%/*}"
            VER_PART="${BRANCH#*/v}"
            BRANCH_MAJOR="${VER_PART%%.*}"
            BRANCH_MINOR="${VER_PART#*.}"
            for pkg in $PACKAGES; do
              stripped=$(read_stripped "packages/${pkg}/package.json")
              pkg_major=$(echo "$stripped" | cut -d. -f1)
              pkg_minor=$(echo "$stripped" | cut -d. -f2)
              pkg_patch=$(echo "$stripped" | cut -d. -f3)
              pkg_patch="${pkg_patch:-0}"
              if [[ "$pkg_major" == "$BRANCH_MAJOR" && "$pkg_minor" == "$BRANCH_MINOR" ]]; then
                new_ver="${BRANCH_MAJOR}.${BRANCH_MINOR}.$((pkg_patch + 1))-${NPM_CHANNEL}"
              else
                new_ver="${BRANCH_MAJOR}.${BRANCH_MINOR}.0-${NPM_CHANNEL}"
              fi
              echo "${pkg}_version=${new_ver}" >> "$GITHUB_OUTPUT"
              if [[ "$pkg" == "base" ]]; then
                echo "release_tag=v${new_ver}" >> "$GITHUB_OUTPUT"
              fi
            done
          fi

      - name: Bump versions in all package.json files
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            ver_key="${pkg}_version"
            # Use indirect expansion to read the output by dynamic key name.
            new_ver=$(node -e "
              const fs = require('fs');
              const out = fs.readFileSync('$GITHUB_OUTPUT','utf8');
              const m = out.match(/${ver_key}=(.+)/);
              console.log(m ? m[1].trim() : '');
            ")
            echo "Bumping packages/${pkg} to ${new_ver}"
            npm version "${new_ver}" --no-git-tag-version --prefix "packages/${pkg}"
          done

      - name: Commit and push version bumps
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for pkg in ${{ steps.packages.outputs.list }}; do
            git add "packages/${pkg}/package.json"
          done
          git commit -m "chore: bump package versions [skip ci]"
          git push

      - name: Build release body
        id: body
        run: |
          BODY="## Packages"$'\n'
          for pkg in ${{ steps.packages.outputs.list }}; do
            ver_key="${pkg}_version"
            new_ver=$(node -e "
              const fs = require('fs');
              const out = fs.readFileSync('$GITHUB_OUTPUT','utf8');
              const m = out.match(/${ver_key}=(.+)/);
              console.log(m ? m[1].trim() : '');
            ")
            name=$(node -p "require('./packages/${pkg}/package.json').name")
            BODY+="- \`${name}@${new_ver}\`"$'\n'
          done
          # Write multi-line output safely.
          {
            echo "text<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.version.outputs.release_tag }}
          name:                   ${{ steps.version.outputs.release_tag }}
          prerelease:             ${{ github.ref_name != 'main' }}
          generate_release_notes: true
          body:                   ${{ steps.body.outputs.text }}

