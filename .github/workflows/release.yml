# Release workflow — manually triggered to compute the version, build, and publish packages to npm.
#
# The version is derived entirely from the branch name:
#
#   Stable:     v<MAJOR>.<MINOR>          (e.g. v0.1)
#               Published as: <MAJOR>.<MINOR>.<NEXT>          npm tag: latest
#
#   Prerelease: v<MAJOR>.<MINOR>-<CHANNEL> (e.g. v0.1-alpha)
#               Published as: <MAJOR>.<MINOR>.<NEXT>-<CHANNEL> npm tag: <CHANNEL>
#
# NEXT is determined by querying npmjs for the highest existing patch number in the
# same MAJOR.MINOR series (and same CHANNEL for prereleases), then incrementing by 1.
# If no matching version exists yet, NEXT starts at 0.
#
# package.json files always contain "0.0.0" in git — versions are set in-place during
# this workflow and never committed back.
#
# Steps:
#   1. Validate the branch name and extract MAJOR, MINOR, CHANNEL.
#   2. Discover publishable packages (have "prepublish" script, not in EXCLUDED_PACKAGES).
#   3. Install dependencies.
#   4. Compute the next free patch version per package by querying npmjs.
#   5. Set the computed version in each package.json (no commit).
#   6. Build all packages via "prepublish" (lint + typecheck + build + unit tests).
#   7. Dry-run publish all packages — abort if any would fail.
#   8. Publish all packages to npm with --tag <CHANNEL>.
#   9. Create a GitHub release and git tag.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # REQUIRED for trusted npm publishing

env:
  EXCLUDED_PACKAGES: generator

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org/'

      - name: Validate branch name and extract version components
        id: ver
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" =~ ^v([0-9]+)\.([0-9]+)-([a-zA-Z][a-zA-Z0-9]*)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            CHANNEL="${BASH_REMATCH[3]}"
            IS_PRERELEASE=true
            NPM_TAG="${CHANNEL}"
            echo "Branch '${BRANCH}' parsed: MAJOR=${MAJOR} MINOR=${MINOR} CHANNEL=${CHANNEL} (prerelease)"
          elif [[ "$BRANCH" =~ ^v([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            CHANNEL=""
            IS_PRERELEASE=false
            NPM_TAG=latest
            echo "Branch '${BRANCH}' parsed: MAJOR=${MAJOR} MINOR=${MINOR} (stable)"
          else
            echo "ERROR: Branch '${BRANCH}' does not match a supported release branch format."
            echo "       Stable:     v<MAJOR>.<MINOR>            e.g. v0.1"
            echo "       Prerelease: v<MAJOR>.<MINOR>-<CHANNEL>  e.g. v0.1-alpha"
            exit 1
          fi
          echo "major=${MAJOR}"             >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}"             >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}"         >> "$GITHUB_OUTPUT"
          echo "npm_tag=${NPM_TAG}"         >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Discover publishable packages
        id: packages
        run: |
          DIRS=()
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            if echo " $EXCLUDED_PACKAGES " | grep -qw "$name"; then
              echo "Skipping excluded package: $name"
              continue
            fi
            if ! node -e "const p=require('./${pkg}package.json'); process.exit(p.scripts&&p.scripts.prepublish?0:1)" 2>/dev/null; then
              echo "Skipping package without prepublish script: $name"
              continue
            fi
            DIRS+=("$name")
            echo "Found publishable package: $name"
          done
          echo "list=${DIRS[*]}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Compute next version for each package
        id: compute_versions
        run: |
          MAJOR="${{ steps.ver.outputs.major }}"
          MINOR="${{ steps.ver.outputs.minor }}"
          CHANNEL="${{ steps.ver.outputs.channel }}"
          IS_PRERELEASE="${{ steps.ver.outputs.is_prerelease }}"
          VERSIONS_FILE="$GITHUB_WORKSPACE/.versions.env"
          > "$VERSIONS_FILE"

          for pkg in ${{ steps.packages.outputs.list }}; do
            PKG_NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            echo "Querying npmjs for ${PKG_NAME} versions..."

            # Fetch all published versions; fall back to empty array if package is unpublished.
            ALL_VERSIONS=$(npm view "${PKG_NAME}" versions --json 2>/dev/null || echo "[]")

            if [[ "$IS_PRERELEASE" == "true" ]]; then
              # Prerelease: match <MAJOR>.<MINOR>.<patch>-<CHANNEL>
              NEXT_PATCH=$(node -e "
                const versions = ${ALL_VERSIONS};
                const prefix = '${MAJOR}.${MINOR}.';
                const suffix = '-${CHANNEL}';
                const patches = versions
                  .filter(v => v.startsWith(prefix) && v.endsWith(suffix))
                  .map(v => parseInt(v.slice(prefix.length, v.length - suffix.length), 10))
                  .filter(n => !isNaN(n));
                console.log(patches.length > 0 ? Math.max(...patches) + 1 : 0);
              ")
              NEW_VER="${MAJOR}.${MINOR}.${NEXT_PATCH}-${CHANNEL}"
            else
              # Stable: match <MAJOR>.<MINOR>.<patch> with no prerelease suffix
              NEXT_PATCH=$(node -e "
                const versions = ${ALL_VERSIONS};
                const prefix = '${MAJOR}.${MINOR}.';
                const patches = versions
                  .filter(v => v.startsWith(prefix) && !v.includes('-'))
                  .map(v => parseInt(v.slice(prefix.length), 10))
                  .filter(n => !isNaN(n));
                console.log(patches.length > 0 ? Math.max(...patches) + 1 : 0);
              ")
              NEW_VER="${MAJOR}.${MINOR}.${NEXT_PATCH}"
            fi
            echo "  ${PKG_NAME}: next version = ${NEW_VER}"
            echo "${pkg}_version=${NEW_VER}" >> "$VERSIONS_FILE"
          done

      - name: Set versions in package.json files (no commit)
        run: |
          source "$GITHUB_WORKSPACE/.versions.env"
          for pkg in ${{ steps.packages.outputs.list }}; do
            ver_key="${pkg}_version"
            new_ver="${!ver_key}"
            echo "Setting packages/${pkg} version to ${new_ver}"
            npm version "${new_ver}" --no-git-tag-version --prefix "packages/${pkg}"
          done

      - name: Build all packages
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== build: packages/${pkg} ==="
            npm run prepublish --prefix "packages/${pkg}"
          done

      - name: Dry-run publish (pre-check — no packages are published yet)
        run: |
          NPM_TAG="${{ steps.ver.outputs.npm_tag }}"
          echo "=== Dry-run publish to verify all packages before any real publish ==="
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "--- dry-run: packages/${pkg} ---"
            (cd "packages/${pkg}" && npm publish --dry-run --tag "${NPM_TAG}")
          done
          echo "=== Dry-run completed successfully for all packages ==="
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish all packages to npm
        run: |
          NPM_TAG="${{ steps.ver.outputs.npm_tag }}"
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== publishing: packages/${pkg} ==="
            (cd "packages/${pkg}" && npm publish --tag "${NPM_TAG}")
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Determine release tag
        id: meta
        run: |
          BASE_VER=$(node -p "require('./packages/base/package.json').version")
          echo "release_tag=v${BASE_VER}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          BODY="## Packages"$'\n'
          for pkg in ${{ steps.packages.outputs.list }}; do
            name=$(node -p "require('./packages/${pkg}/package.json').name")
            version=$(node -p "require('./packages/${pkg}/package.json').version")
            BODY+="- \`${name}@${version}\`"$'\n'
          done
          {
            echo "text<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.ver.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.meta.outputs.release_tag }}
          name:                   ${{ steps.meta.outputs.release_tag }}
          prerelease:             ${{ steps.ver.outputs.is_prerelease }}
          generate_release_notes: true
          body:                   ${{ steps.body.outputs.text }}
          target_commitish:       ${{ github.ref_name }}
