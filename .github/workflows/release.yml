# CI workflow — runs on every push to main and prerelease branches.
#
# Steps:
#   1. Discover all publishable packages (have a "prepublish" script, not in EXCLUDED_PACKAGES).
#   2. Build (prepublish) all packages.
#   3. Run unit tests.
#   4. Compute and bump the next semver for each package:
#        main branch:           patch bump, no prerelease suffix.
#        <channel>/v<M>.<m>:    patch bump with -<channel> suffix.
#   5. Commit and push the bumped package.json files.
#
# To publish a release, trigger the Release workflow manually.

name: CI

on:
  push:
    branches:
      - main
      - '*/v*'

permissions:
  contents: write

env:
  EXCLUDED_PACKAGES: generator

jobs:
  ci:
    runs-on: ubuntu-latest
    # Do not re-run when the bot pushes the version-bump commit.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Discover publishable packages
        id: packages
        run: |
          DIRS=()
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            if echo " $EXCLUDED_PACKAGES " | grep -qw "$name"; then
              echo "Skipping excluded package: $name"
              continue
            fi
            if ! node -e "const p=require('./${pkg}package.json'); process.exit(p.scripts&&p.scripts.prepublish?0:1)" 2>/dev/null; then
              echo "Skipping package without prepublish script: $name"
              continue
            fi
            DIRS+=("$name")
            echo "Found publishable package: $name"
          done
          echo "list=${DIRS[*]}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== build: packages/${pkg} ==="
            npm run prepublish --prefix "packages/${pkg}"
          done

      - name: Run tests
        run: |
          for pkg in ${{ steps.packages.outputs.list }}; do
            echo "=== test: packages/${pkg} ==="
            cd "packages/${pkg}"
            OPCUA_EXTERNAL_SERVER=1 npx vitest run
            cd "$GITHUB_WORKSPACE"
          done

      - name: Compute new versions
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          PACKAGES="${{ steps.packages.outputs.list }}"

          read_stripped() {
            local pkgfile="$1" current
            current=$(node -p "require('./${pkgfile}').version")
            echo "${current%%-*}"
          }

          VERSIONS_FILE="$GITHUB_WORKSPACE/.versions.env"
          > "$VERSIONS_FILE"

          if [[ "$BRANCH" == "main" ]]; then
            for pkg in $PACKAGES; do
              stripped=$(read_stripped "packages/${pkg}/package.json")
              major=$(echo "$stripped" | cut -d. -f1)
              minor=$(echo "$stripped" | cut -d. -f2)
              patch=$(echo "$stripped" | cut -d. -f3)
              patch="${patch:-0}"
              new_ver="${major}.${minor}.$((patch + 1))"
              echo "${pkg}_version=${new_ver}" >> "$VERSIONS_FILE"
            done
          else
            NPM_CHANNEL="${BRANCH%%/*}"
            VER_PART="${BRANCH#*/v}"
            BRANCH_MAJOR="${VER_PART%%.*}"
            BRANCH_MINOR="${VER_PART#*.}"
            for pkg in $PACKAGES; do
              stripped=$(read_stripped "packages/${pkg}/package.json")
              pkg_major=$(echo "$stripped" | cut -d. -f1)
              pkg_minor=$(echo "$stripped" | cut -d. -f2)
              pkg_patch=$(echo "$stripped" | cut -d. -f3)
              pkg_patch="${pkg_patch:-0}"
              if [[ "$pkg_major" == "$BRANCH_MAJOR" && "$pkg_minor" == "$BRANCH_MINOR" ]]; then
                new_ver="${BRANCH_MAJOR}.${BRANCH_MINOR}.$((pkg_patch + 1))-${NPM_CHANNEL}"
              else
                new_ver="${BRANCH_MAJOR}.${BRANCH_MINOR}.0-${NPM_CHANNEL}"
              fi
              echo "${pkg}_version=${new_ver}" >> "$VERSIONS_FILE"
            done
          fi

      - name: Bump versions in all package.json files
        run: |
          source "$GITHUB_WORKSPACE/.versions.env"
          for pkg in ${{ steps.packages.outputs.list }}; do
            ver_key="${pkg}_version"
            new_ver="${!ver_key}"
            echo "Bumping packages/${pkg} to ${new_ver}"
            npm version "${new_ver}" --no-git-tag-version --prefix "packages/${pkg}"
          done

      - name: Commit and push version bumps
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for pkg in ${{ steps.packages.outputs.list }}; do
            git add "packages/${pkg}/package.json"
          done
          git commit -m "chore: bump package versions [skip ci]"
          git push
